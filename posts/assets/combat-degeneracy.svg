<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 170" width="760" height="170" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"><rect x="0.5" y="0.5" width="759" height="169" rx="10" fill="#ffffff" stroke="#d2d6dc"/><text x="28" y="40" font-size="16" fill="#1f2933" text-anchor="start" font-weight="600">Why combat can't be measured for bias: the decision is usually degenerate</text><text x="28" y="60" font-size="12" fill="#7b8794" text-anchor="start" font-weight="400">53 valid combat decisions, replayed</text><rect x="40" y="78" width="538.9" height="48" fill="#9aa5b1" rx="0"/><rect x="578.9" y="78" width="141.1" height="48" fill="#2b6cb0"/><rect x="40" y="78" width="680" height="48" fill="none" stroke="#d2d6dc"/><text x="309.4339622641509" y="107.0" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="700">42 alpha-strikes (79%)</text><text x="309.4339622641509" y="148" font-size="11" fill="#7b8794" text-anchor="middle" font-weight="400">sent every attacker — order can't matter</text><text x="649.433962264151" y="107.0" font-size="13" fill="#ffffff" text-anchor="middle" font-weight="700">11 (21%)</text><text x="649.433962264151" y="148" font-size="11" fill="#7b8794" text-anchor="middle" font-weight="400">held ≥1 back — the only measurable slice</text></svg>
