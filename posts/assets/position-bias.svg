<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"><rect x="0.5" y="0.5" width="759" height="339" rx="10" fill="#ffffff" stroke="#d2d6dc"/><text x="28" y="40" font-size="16" fill="#1f2933" text-anchor="start" font-weight="600">Does reasoning stop the model anchoring to slot 1?</text><text x="28" y="60" font-size="12" fill="#7b8794" text-anchor="start" font-weight="400">How often it picks the first option  ·  lower is better (toward the no-bias floor)</text><line x1="70" y1="268.0" x2="720" y2="268.0" stroke="#e4e7eb"/><text x="60" y="272.0" font-size="11" fill="#7b8794" text-anchor="end" font-weight="400">0%</text><line x1="70" y1="232.8" x2="720" y2="232.8" stroke="#e4e7eb"/><text x="60" y="236.8" font-size="11" fill="#7b8794" text-anchor="end" font-weight="400">10%</text><line x1="70" y1="197.6" x2="720" y2="197.6" stroke="#e4e7eb"/><text x="60" y="201.6" font-size="11" fill="#7b8794" text-anchor="end" font-weight="400">20%</text><line x1="70" y1="162.4" x2="720" y2="162.4" stroke="#e4e7eb"/><text x="60" y="166.4" font-size="11" fill="#7b8794" text-anchor="end" font-weight="400">30%</text><line x1="70" y1="127.2" x2="720" y2="127.2" stroke="#e4e7eb"/><text x="60" y="131.2" font-size="11" fill="#7b8794" text-anchor="end" font-weight="400">40%</text><line x1="70" y1="92.0" x2="720" y2="92.0" stroke="#e4e7eb"/><text x="60" y="96.0" font-size="11" fill="#7b8794" text-anchor="end" font-weight="400">50%</text><rect x="164" y="99.7" width="78" height="168.3" fill="#9aa5b1" rx="3"/><text x="203.0" y="91.744" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="600">47.8%</text><text x="203.0" y="286" font-size="11" fill="#7b8794" text-anchor="middle" font-weight="400">reasoning off</text><rect x="258" y="175.8" width="78" height="92.2" fill="#2b6cb0" rx="3"/><text x="297.0" y="167.776" font-size="12" fill="#2b6cb0" text-anchor="middle" font-weight="700">26.2%</text><text x="297.0" y="286" font-size="11" fill="#7b8794" text-anchor="middle" font-weight="400">reasoning on</text><line x1="158" y1="204.6" x2="342" y2="204.6" stroke="#dd8a2b" stroke-width="2" stroke-dasharray="5 4"/><text x="346" y="208.64" font-size="10" fill="#dd8a2b" text-anchor="start" font-weight="400">floor 18%</text><text x="250" y="306" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="600">All menus</text><rect x="454" y="133.5" width="78" height="134.5" fill="#9aa5b1" rx="3"/><text x="493.0" y="125.536" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="600">38.2%</text><text x="493.0" y="286" font-size="11" fill="#7b8794" text-anchor="middle" font-weight="400">reasoning off</text><rect x="548" y="222.6" width="78" height="45.4" fill="#2b6cb0" rx="3"/><text x="587.0" y="214.59199999999998" font-size="12" fill="#2b6cb0" text-anchor="middle" font-weight="700">12.9%</text><text x="587.0" y="286" font-size="11" fill="#7b8794" text-anchor="middle" font-weight="400">reasoning on</text><line x1="448" y1="225.8" x2="632" y2="225.8" stroke="#dd8a2b" stroke-width="2" stroke-dasharray="5 4"/><text x="636" y="229.76" font-size="10" fill="#dd8a2b" text-anchor="start" font-weight="400">floor 12%</text><text x="540" y="306" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="600">Long menus (7+ options)</text><line x1="28" y1="312" x2="732" y2="312" stroke="#e4e7eb"/><text x="28" y="330" font-size="11" fill="#7b8794" text-anchor="start" font-weight="400">But content-stability barely moved: same pick after a pure reorder 37.8% → 45.2% (higher is better; ~100% = reads the board).</text></svg>
