<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 322" width="760" height="322" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"><rect x="0.5" y="0.5" width="759" height="321" rx="10" fill="#ffffff" stroke="#d2d6dc"/><text x="28" y="40" font-size="16" fill="#1f2933" text-anchor="start" font-weight="600">A 100-row audit: the training prompts described games that never happened</text><text x="28" y="60" font-size="12" fill="#7b8794" text-anchor="start" font-weight="400">Share of round-1 training prompts carrying each defect  ·  every defect is a display bug, not a rules bug</text><line x1="210" y1="80" x2="210" y2="250" stroke="#e4e7eb"/><text x="210" y="266" font-size="11" fill="#7b8794" text-anchor="middle" font-weight="400">0%</text><line x1="380" y1="80" x2="380" y2="250" stroke="#e4e7eb"/><text x="380" y="266" font-size="11" fill="#7b8794" text-anchor="middle" font-weight="400">20%</text><line x1="550" y1="80" x2="550" y2="250" stroke="#e4e7eb"/><text x="550" y="266" font-size="11" fill="#7b8794" text-anchor="middle" font-weight="400">40%</text><line x1="720" y1="80" x2="720" y2="250" stroke="#e4e7eb"/><text x="720" y="266" font-size="11" fill="#7b8794" text-anchor="middle" font-weight="400">60%</text><rect x="210" y="92" width="473.5" height="34" fill="#2b6cb0" rx="3"/><text x="200" y="114" font-size="12.5" fill="#1f2933" text-anchor="end" font-weight="600">Stale / phantom combat</text><text x="677" y="114" font-size="12" fill="#ffffff" text-anchor="end" font-weight="700">55.7%</text><rect x="210" y="144" width="115.6" height="34" fill="#9aa5b1" rx="3"/><text x="200" y="166" font-size="12.5" fill="#1f2933" text-anchor="end" font-weight="600">Duplicate menu options</text><text x="331" y="166" font-size="12" fill="#3e4c59" text-anchor="start" font-weight="700">13.6%</text><rect x="210" y="196" width="74.8" height="34" fill="#9aa5b1" rx="3"/><text x="200" y="218" font-size="12.5" fill="#1f2933" text-anchor="end" font-weight="600">Sentinel &amp; predicate leaks</text><text x="290" y="218" font-size="12" fill="#3e4c59" text-anchor="start" font-weight="700">8.8%</text><line x1="706" y1="72" x2="706" y2="250" stroke="#dd8a2b" stroke-width="2" stroke-dasharray="5 4"/><text x="700" y="70" font-size="11" fill="#dd8a2b" text-anchor="end" font-weight="600">58.4% had at least one defect</text><line x1="28" y1="284" x2="732" y2="284" stroke="#e4e7eb"/><text x="28" y="302" font-size="11" fill="#7b8794" text-anchor="start" font-weight="400">Categories overlap — one prompt often carried several — so they sum past the 58.4% of prompts with at least one defect.</text></svg>
